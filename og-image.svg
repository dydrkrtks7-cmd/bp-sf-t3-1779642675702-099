<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="446" cy="91" r="76" fill="#be185d" opacity="0.13"/>
    <circle cx="52" cy="374" r="80" fill="#be185d" opacity="0.08"/>
    <circle cx="1137" cy="334" r="24" fill="#be185d" opacity="0.18"/>
    <circle cx="465" cy="74" r="32" fill="#be185d" opacity="0.09"/>
    <circle cx="711" cy="313" r="77" fill="#be185d" opacity="0.08"/>
    <circle cx="1183" cy="557" r="24" fill="#be185d" opacity="0.12"/>
    <rect x="962" y="540" width="71" height="62" rx="8" fill="#db2777" opacity="0.12" transform="rotate(5, 519, 271)"/>
    <rect x="904" y="565" width="23" height="43" rx="8" fill="#db2777" opacity="0.12" transform="rotate(14, 126, -35)"/>
    <rect x="688" y="69" width="25" height="73" rx="8" fill="#db2777" opacity="0.04" transform="rotate(40, 352, 600)"/>
    <rect x="1053" y="-81" width="36" height="57" rx="8" fill="#db2777" opacity="0.03" transform="rotate(14, 126, 27)"/>
    <rect x="602" y="180" width="59" height="99" rx="8" fill="#db2777" opacity="0.09" transform="rotate(19, 1246, 147)"/>
    <rect x="658" y="427" width="60" height="45" rx="8" fill="#db2777" opacity="0.08" transform="rotate(12, 1285, 416)"/>
    <rect x="306" y="-77" width="85" height="57" rx="8" fill="#db2777" opacity="0.07" transform="rotate(44, 570, 714)"/>
    <rect x="767" y="131" width="30" height="54" rx="8" fill="#db2777" opacity="0.10" transform="rotate(25, 1068, 49)"/>
    <polygon points="322,-5 390,131 254,131" fill="#be185d" opacity="0.05"/>
    <polygon points="467,383 509,467 425,467" fill="#be185d" opacity="0.04"/>
    <polygon points="1240,-28 1333,158 1147,158" fill="#be185d" opacity="0.07"/>
    <polygon points="9,-94 47,-18 -29,-18" fill="#be185d" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,542 C360,586 840,498 1200,542 L1200,630 L0,630Z" fill="#be185d" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 상위노출 대행
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 스트릿패션
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fda4af" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fda4af" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 구글 상위노출 대행 — 스트릿패션
  </text>
</svg>